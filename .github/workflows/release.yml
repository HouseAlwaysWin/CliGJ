name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to release (e.g. v0.1.0)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-app-windows:
    runs-on: windows-latest
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.version }}".Trim() -ne "") {
            $tag = "${{ inputs.version }}".Trim()
          }
          if (-not $tag.StartsWith("v")) {
            throw "Release tag must start with 'v'. Got: $tag"
          }
          "value=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-windows
          cache-on-failure: true

      - name: Build release binary
        run: cargo build --release

      - name: Prepare app asset
        id: asset
        shell: pwsh
        run: |
          $exeAssetName = "CliGJ.exe"
          if (Test-Path $exeAssetName) {
            Remove-Item $exeAssetName -Force
          }
          Copy-Item "target/release/CliGJ.exe" $exeAssetName -Force
          "name=$exeAssetName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload app artifact
        uses: actions/upload-artifact@v5
        with:
          name: cligj-app
          path: ${{ steps.asset.outputs.name }}
          if-no-files-found: error
          retention-days: 7

  build-vsix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            TAG="${{ inputs.version }}"
          fi
          if [[ "${TAG}" != v* ]]; then
            echo "Release tag must start with 'v'. Got: ${TAG}"
            exit 1
          fi
          echo "value=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Build VS Code extension package
        working-directory: vscode-extension
        run: |
          npm ci
          npm run compile
          npx @vscode/vsce package --no-yarn

      - name: Prepare VSIX asset
        id: asset
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          VSIX_SOURCE="$(ls vscode-extension/*.vsix | head -n 1)"
          if [ -z "${VSIX_SOURCE}" ]; then
            echo "VSIX package not found under vscode-extension/"
            exit 1
          fi
          VSIX_ASSET="CliGJ-Bridge-${TAG}.vsix"
          cp "${VSIX_SOURCE}" "${VSIX_ASSET}"
          echo "name=${VSIX_ASSET}" >> "$GITHUB_OUTPUT"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v5
        with:
          name: cligj-vsix
          path: ${{ steps.asset.outputs.name }}
          if-no-files-found: error
          retention-days: 7

  create-release:
    needs: [build-app-windows, build-vsix]
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            TAG="${{ inputs.version }}"
          fi
          if [[ "${TAG}" != v* ]]; then
            echo "Release tag must start with 'v'. Got: ${TAG}"
            exit 1
          fi
          echo "value=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Download all release artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist

      - name: Build combined release zip
        id: bundle
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          BUNDLE_DIR="bundle-${TAG}"
          BUNDLE_ZIP="CliGJ-${TAG}-windows-x64.zip"

          rm -rf "${BUNDLE_DIR}" "${BUNDLE_ZIP}"
          mkdir -p "${BUNDLE_DIR}"

          cp "dist/cligj-app/CliGJ.exe" "${BUNDLE_DIR}/CliGJ.exe"
          cp dist/cligj-vsix/*.vsix "${BUNDLE_DIR}/"

          (
            cd "${BUNDLE_DIR}"
            zip -r "../${BUNDLE_ZIP}" .
          )

          echo "name=${BUNDLE_ZIP}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          files: |
            ${{ steps.bundle.outputs.name }}
            dist/cligj-vsix/*
          generate_release_notes: true
