name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to release (e.g. v0.1.0)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-release-windows:
    runs-on: windows-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.version }}".Trim() -ne "") {
            $tag = "${{ inputs.version }}".Trim()
          }
          if (-not $tag.StartsWith("v")) {
            throw "Release tag must start with 'v'. Got: $tag"
          }
          "value=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Build release binary
        run: cargo build --release

      - name: Build VS Code extension package
        working-directory: vscode-extension
        run: |
          npm ci
          npm run compile
          npx @vscode/vsce package --no-yarn

      - name: Prepare assets
        id: asset
        shell: pwsh
        run: |
          $tag = "${{ steps.tag.outputs.value }}"
          $exeAssetName = "CliGJ-$tag-windows-x64.exe"
          Copy-Item "target/release/CliGJ.exe" $exeAssetName -Force

          $vsixSource = Get-ChildItem "vscode-extension/*.vsix" | Select-Object -First 1
          if (-not $vsixSource) {
            throw "VSIX package not found under vscode-extension/"
          }
          $vsixAssetName = "CliGJ-Bridge-$tag.vsix"
          Copy-Item $vsixSource.FullName $vsixAssetName -Force

          "exe=$exeAssetName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "vsix=$vsixAssetName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          files: |
            ${{ steps.asset.outputs.exe }}
            ${{ steps.asset.outputs.vsix }}
          generate_release_notes: true
