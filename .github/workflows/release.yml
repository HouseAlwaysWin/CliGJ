name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to release (e.g. v0.1.0)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-release-windows:
    runs-on: windows-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.version }}".Trim() -ne "") {
            $tag = "${{ inputs.version }}".Trim()
          }
          if (-not $tag.StartsWith("v")) {
            throw "Release tag must start with 'v'. Got: $tag"
          }
          "value=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Prepare asset
        id: asset
        shell: pwsh
        run: |
          $tag = "${{ steps.tag.outputs.value }}"
          $assetName = "CliGJ-$tag-windows-x64.exe"
          Copy-Item "target/release/CliGJ.exe" $assetName -Force
          "name=$assetName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create GitHub release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          files: ${{ steps.asset.outputs.name }}
          generate_release_notes: true
